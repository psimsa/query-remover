name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        id: setup_pages
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/configure-pages@v4

      - name: Upload artifact
        id: upload_artifact
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Warn when Pages preparation fails
        if: github.ref == 'refs/heads/main' && (steps.setup_pages.outcome == 'failure' || steps.upload_artifact.outcome == 'failure')
        run: echo "::warning::GitHub Pages is misconfigured. Build succeeded, but Pages setup/upload failed."

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Warn when deployment fails
        if: steps.deployment.outcome == 'failure'
        run: echo "::warning::GitHub Pages deployment failed due to configuration issues."
